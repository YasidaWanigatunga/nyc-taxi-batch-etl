<svg width="100%" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg" style="background:#fff">
<title>NYC Taxi batch ETL pipeline architecture</title>
<desc>Data flows from TLC CloudFront through an Airflow DAG that extracts, cleans, and loads into a PostgreSQL star schema, served by a Streamlit dashboard.</desc>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .th { font-size: 13px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-size: 11px; fill: #555; }
  .tt { font-size: 10px; fill: #777; font-family: monospace; }
  .arr { stroke: #888; stroke-width: 1.2; }
  .arr-data { stroke: #1D9E75; stroke-width: 1.5; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- SOURCE -->
<rect x="230" y="20" width="220" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text class="th" x="340" y="40" text-anchor="middle" fill="#2C2C2A">NYC TLC CloudFront</text>
<text class="ts" x="340" y="56" text-anchor="middle" fill="#5F5E5A">Yellow Taxi parquet · zone lookup CSV</text>

<!-- Arrow: source → setup -->
<line x1="340" y1="72" x2="340" y2="100" class="arr-data" marker-end="url(#ah)"/>
<text class="tt" x="348" y="90">curl -fL --retry</text>

<!-- SETUP.SH -->
<rect x="230" y="102" width="220" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text class="th" x="340" y="120" text-anchor="middle" fill="#2C2C2A">setup.sh</text>
<text class="ts" x="340" y="136" text-anchor="middle" fill="#5F5E5A">venv · deps · docker compose up</text>

<!-- Arrow: setup → airflow -->
<line x1="340" y1="148" x2="340" y2="176" class="arr" marker-end="url(#ah)"/>

<!-- AIRFLOW DAG container -->
<rect x="40" y="180" width="600" height="230" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" x="60" y="202" fill="#3C3489">Apache Airflow DAG — nyc_taxi_batch_etl</text>

<!-- create_schema -->
<rect x="60" y="215" width="120" height="44" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="120" y="233" text-anchor="middle" fill="#3C3489">create_schema</text>
<text class="tt" x="120" y="248" text-anchor="middle">schema.sql</text>

<!-- get_months -->
<rect x="60" y="280" width="120" height="44" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="120" y="298" text-anchor="middle" fill="#3C3489">get_months</text>
<text class="tt" x="120" y="313" text-anchor="middle">[2023-01, 02]</text>

<!-- build_dimensions -->
<rect x="200" y="215" width="130" height="109" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="265" y="233" text-anchor="middle" fill="#3C3489">build_dimensions</text>
<text class="tt" x="265" y="250" text-anchor="middle">dim_date</text>
<text class="tt" x="265" y="264" text-anchor="middle">dim_time</text>
<text class="tt" x="265" y="278" text-anchor="middle">dim_location</text>
<text class="tt" x="265" y="292" text-anchor="middle">dim_vendor + 2</text>

<!-- download_month -->
<rect x="350" y="230" width="130" height="44" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="415" y="248" text-anchor="middle" fill="#3C3489">download_month [2]</text>
<text class="tt" x="415" y="263" text-anchor="middle">extract (idempotent)</text>

<!-- process_month -->
<rect x="350" y="290" width="130" height="60" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="415" y="308" text-anchor="middle" fill="#3C3489">process_month [2]</text>
<text class="tt" x="415" y="323" text-anchor="middle">clean · conform</text>
<text class="tt" x="415" y="337" text-anchor="middle">reject · COPY</text>

<!-- quality_check -->
<rect x="500" y="290" width="120" height="60" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="560" y="308" text-anchor="middle" fill="#3C3489">quality_check</text>
<text class="tt" x="560" y="323" text-anchor="middle">empty · orphan FK</text>
<text class="tt" x="560" y="337" text-anchor="middle">negative · null</text>

<!-- DAG internal arrows -->
<line x1="180" y1="237" x2="198" y2="237" class="arr" marker-end="url(#ah)"/>
<line x1="180" y1="302" x2="198" y2="290" class="arr" marker-end="url(#ah)"/>
<line x1="330" y1="252" x2="348" y2="252" class="arr" marker-end="url(#ah)"/>
<line x1="415" y1="274" x2="415" y2="288" class="arr" marker-end="url(#ah)"/>
<line x1="330" y1="300" x2="348" y2="315" class="arr" marker-end="url(#ah)" opacity="0.5"/>
<line x1="480" y1="320" x2="498" y2="320" class="arr" marker-end="url(#ah)"/>

<!-- logging note -->
<rect x="60" y="355" width="270" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="195" y="372" text-anchor="middle" fill="#0C447C">JSON logging + on_failure_callback</text>
<text class="tt" x="195" y="386" text-anchor="middle">row counts · duration · alerts</text>

<!-- Arrow: DAG → postgres -->
<line x1="415" y1="410" x2="415" y2="440" class="arr-data" marker-end="url(#ah)"/>
<text class="tt" x="423" y="428">COPY FROM STDIN</text>

<!-- POSTGRES star schema -->
<rect x="120" y="445" width="440" height="130" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
<text class="th" x="340" y="467" text-anchor="middle" fill="#27500A">PostgreSQL — Star Schema</text>

<!-- fact table center -->
<rect x="270" y="480" width="140" height="50" rx="6" fill="#97C459" stroke="#27500A" stroke-width="0.6"/>
<text class="ts" x="340" y="500" text-anchor="middle" fill="#173404">fact_taxi_trips</text>
<text class="tt" x="340" y="516" text-anchor="middle">5.8M rows</text>

<!-- dims around -->
<rect x="135" y="483" width="110" height="26" rx="4" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.4"/>
<text class="tt" x="190" y="500" text-anchor="middle">dim_date · dim_time</text>

<rect x="135" y="515" width="110" height="26" rx="4" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.4"/>
<text class="tt" x="190" y="532" text-anchor="middle">dim_location</text>

<rect x="435" y="483" width="110" height="26" rx="4" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.4"/>
<text class="tt" x="490" y="500" text-anchor="middle">dim_payment</text>

<rect x="435" y="515" width="110" height="26" rx="4" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.4"/>
<text class="tt" x="490" y="532" text-anchor="middle">dim_vendor · rate</text>

<!-- fact-dim connectors -->
<line x1="245" y1="496" x2="270" y2="500" class="arr" stroke-width="0.6"/>
<line x1="245" y1="528" x2="270" y2="512" class="arr" stroke-width="0.6"/>
<line x1="410" y1="500" x2="435" y2="496" class="arr" stroke-width="0.6"/>
<line x1="410" y1="512" x2="435" y2="528" class="arr" stroke-width="0.6"/>

<text class="tt" x="340" y="552" text-anchor="middle" fill="#3B6D11">6 dimensions + etl_run_audit · NUMERIC money · FKs</text>

<!-- Arrow: postgres → streamlit -->
<line x1="340" y1="575" x2="340" y2="605" class="arr-data" marker-end="url(#ah)"/>
<text class="tt" x="348" y="593">SQL (read-only)</text>

<!-- STREAMLIT -->
<rect x="180" y="608" width="320" height="70" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="th" x="340" y="628" text-anchor="middle" fill="#712B13">Streamlit Dashboard</text>
<text class="tt" x="340" y="646" text-anchor="middle">avg fare/mile · peak hours · revenue by payment</text>
<text class="tt" x="340" y="662" text-anchor="middle">SUM(fare)/SUM(miles) · Plotly · @st.cache_data</text>

<!-- Idempotency callout -->
<rect x="40" y="608" width="120" height="70" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="100" y="628" text-anchor="middle" fill="#633806">Idempotent</text>
<text class="tt" x="100" y="644" text-anchor="middle">DELETE month</text>
<text class="tt" x="100" y="657" text-anchor="middle">then COPY</text>
<text class="tt" x="100" y="670" text-anchor="middle">retry-safe</text>

<!-- Docker note -->
<rect x="520" y="608" width="120" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="580" y="628" text-anchor="middle" fill="#0C447C">Docker</text>
<text class="tt" x="580" y="644" text-anchor="middle">postgres</text>
<text class="tt" x="580" y="657" text-anchor="middle">airflow x3</text>
<text class="tt" x="580" y="670" text-anchor="middle">streamlit</text>
</svg>
