services:
  postgres:
    image: postgres:16-alpine
    container_name: taxi_postgres
    environment:
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: taxi
      POSTGRES_DB: taxi_dw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi_dw"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: