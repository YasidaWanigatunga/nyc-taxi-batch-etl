x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  image: nyc-taxi/airflow:2.9.3
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    TAXI_DW_DSN: postgresql://taxi:taxi@postgres:5432/taxi_dw
    TAXI_MONTHS: ${TAXI_MONTHS:-2023-01,2023-02}
    TAXI_PROJECT_ROOT: /opt/airflow
    PYTHONPATH: /opt/airflow/dags
  volumes:
    - ./dags:/opt/airflow/dags
    - ./sql:/opt/airflow/sql
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: taxi_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: taxi_airflow_init
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Data --lastname Engineer \
          --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: taxi_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: taxi_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: taxi_streamlit
    environment:
      TAXI_DW_DSN: postgresql://taxi:taxi@postgres:5432/taxi_dw
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: